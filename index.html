<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reinos del Tablero — El Mapa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --panel-bg: rgba(20, 26, 18, 0.72);
    --panel-border: rgba(232, 208, 150, 0.35);
    --gold:#e8d096;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#8fc7e0; font-family:'Quicksand',sans-serif; }
  #canvas-holder{ position:absolute; inset:0; }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }

  .title-badge{
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    font-family:'Cinzel', serif; font-weight:700; letter-spacing:1px;
    font-size:20px; color:#fff8e6;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    pointer-events:none; z-index:5; text-align:center;
  }
  .title-badge span{ display:block; font-family:'Quicksand',sans-serif; font-weight:600; font-size:11px; letter-spacing:2.5px; opacity:.85; margin-top:2px; text-transform:uppercase;}

  #roadmap{
    position:absolute; top:18px; left:18px; z-index:10; width:230px;
    background: var(--panel-bg); border:1px solid var(--panel-border); border-radius:14px;
    padding:14px 16px; backdrop-filter: blur(6px); color:#f2ecd8;
    box-shadow: 0 10px 26px rgba(0,0,0,0.3);
  }
  #roadmap h3{ margin:0 0 4px; font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.5px; color:var(--gold); text-transform:uppercase; }
  #roadmap .sub{ font-size:11px; opacity:.75; margin-bottom:10px; }
  #roadmap ul{ list-style:none; margin:0; padding:0; font-size:12.5px; line-height:1.9; }
  #roadmap li{ display:flex; align-items:center; gap:8px; }
  #roadmap li.done::before{ content:"✓"; color:#8fe08a; font-weight:700; }
  #roadmap li.next::before{ content:"…"; color:var(--gold); font-weight:700; }
  #roadmap li b{ font-weight:600; }

  #hint{
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:10;
    font-size:12px; color:#2c2410; background: rgba(255,248,224,0.88);
    padding:7px 16px; border-radius:20px; box-shadow:0 6px 16px rgba(0,0,0,0.25);
    font-weight:600; text-align:center;
  }

  #loading{
    position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(180deg,#9fd0e8,#cdeaf5); color:#33301f; font-family:'Cinzel',serif;
    font-size:16px; letter-spacing:1px; transition:opacity .5s;
  }
</style>
</head>
<body>

<div id="canvas-holder"></div>
<div id="loading">Generando el terreno del reino…</div>

<div class="title-badge">Reinos del Tablero<span>el mapa — fase 1</span></div>

<div id="roadmap">
  <h3>Hoja de ruta</h3>
  <div class="sub">Construyendo el juego paso a paso</div>
  <ul>
    <li class="done"><b>El mapa</b> (terreno 3D)</li>
    <li class="next">Multijugador</li>
    <li class="next">Personalizar / vestir personaje</li>
    <li class="next">Diseño de texturas</li>
    <li class="next">Mecánicas de juego…</li>
  </ul>
</div>

<div id="hint">🖱️ Arrastra para orbitar · rueda para acercar/alejar</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================
   ESCENA BASE
   ============================================================ */

const holder = document.getElementById('canvas-holder');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd0e8);
scene.fog = new THREE.Fog(0x9fd0e8, 180, 780);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.5, 2200);
camera.position.set(25, 190, 320);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
holder.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,4,0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 12;
controls.maxDistance = 620;
controls.maxPolarAngle = Math.PI/2.08;
controls.update();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Luces
const hemi = new THREE.HemisphereLight(0xdcefff, 0x5a6b3a, 0.9);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff3d6, 1.25);
sun.position.set(90, 130, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -220; sun.shadow.camera.right = 220;
sun.shadow.camera.top = 220; sun.shadow.camera.bottom = -220;
sun.shadow.camera.far = 500;
sun.shadow.bias = -0.0018;
scene.add(sun);
const fillLight = new THREE.DirectionalLight(0xcfe3ff, 0.28);
fillLight.position.set(-60,50,-60);
scene.add(fillLight);

/* ============================================================
   RUIDO PROCEDURAL (fBm ligero, sin librerías externas)
   ============================================================ */

function hash2(x,y){
  const s = Math.sin(x*127.1 + y*311.7) * 43758.5453123;
  return s - Math.floor(s);
}
function smoothNoise(x,y){
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x-xi, yf = y-yi;
  const u = xf*xf*(3-2*xf);
  const v = yf*yf*(3-2*yf);
  const a = hash2(xi,yi), b = hash2(xi+1,yi), c = hash2(xi,yi+1), d = hash2(xi+1,yi+1);
  return a + (b-a)*u + (c-a)*v + (a-b-c+d)*u*v;
}
function fbm(x,y,octaves=5){
  let total=0, amp=0.55, freq=1, maxAmp=0;
  for(let i=0;i<octaves;i++){
    total += smoothNoise(x*freq, y*freq) * amp;
    maxAmp += amp;
    amp *= 0.52;
    freq *= 2.05;
  }
  return total/maxAmp; // 0..1 aprox
}
function smoothstep(edge0, edge1, x){
  const t = Math.min(1, Math.max(0, (x-edge0)/(edge1-edge0)));
  return t*t*(3-2*t);
}
function rand(a,b){ return a+Math.random()*(b-a); }

/* ============================================================
   TERRENO: altura, río y plataforma central plana
   ============================================================ */

const TS = 700;          // tamaño total del terreno (mundo casi abierto)
const HALF = TS/2;
const SEG = 260;          // subdivisiones
const FLAT_RADIUS = 34;   // zona central plana reservada para el futuro tablero

function riverOffset(x){
  return 70 + Math.sin(x*0.008)*70 + Math.sin(x*0.028)*16;
}

function baseHeight(x,z){
  const d = Math.sqrt(x*x+z*z);
  const flatBlend = smoothstep(FLAT_RADIUS, FLAT_RADIUS+34, d);

  let n = fbm(x*0.012, z*0.012, 5) * 2 - 1;   // -1..1 ondulación general
  let ridged = 1 - Math.abs(fbm(x*0.022+50, z*0.022+50, 4)*2-1); // crestas
  ridged = Math.pow(Math.max(ridged,0), 2.2);

  const rolling = n * 5;
  const ringBoost = smoothstep(55, 220, d) * (0.5 + ridged*1.4) * 38;

  let h = (rolling + ringBoost) * flatBlend;

  // río: canal que serpentea, hunde el terreno cerca de su centro
  const rz = riverOffset(x);
  const distRiver = Math.abs(z - rz);
  const riverCarve = smoothstep(0, 15, distRiver);
  const riverBed = -2.2;
  h = h*riverCarve + riverBed*(1-riverCarve);

  // proteger la plataforma central de quedar afectada por el río
  if(d < FLAT_RADIUS+10){
    const centerProtect = 1 - smoothstep(FLAT_RADIUS, FLAT_RADIUS+10, d);
    h = h*(1-centerProtect);
  }
  return h;
}

function slopeAt(x,z){
  const e = 1.2;
  const hL = baseHeight(x-e,z), hR = baseHeight(x+e,z);
  const hD = baseHeight(x,z-e), hU = baseHeight(x,z+e);
  const gx = (hR-hL)/(2*e), gz = (hU-hD)/(2*e);
  return Math.sqrt(gx*gx+gz*gz);
}

/* ============================================================
   CONSTRUCCIÓN DE LA GEOMETRÍA DEL TERRENO + COLOR POR ALTURA
   ============================================================ */

const terrainGeo = new THREE.PlaneGeometry(TS, TS, SEG, SEG);
terrainGeo.rotateX(-Math.PI/2);

const posAttr = terrainGeo.attributes.position;
const colorArr = new Float32Array(posAttr.count*3);

const cWater   = new THREE.Color(0xdccca0);
const cGrassLo = new THREE.Color(0x5c9a4a);
const cGrassHi = new THREE.Color(0x77b258);
const cHill    = new THREE.Color(0x8a8258);
const cRock    = new THREE.Color(0x8d8479);
const cSnow    = new THREE.Color(0xf3f7fb);
const cPlateau = new THREE.Color(0xdccd9e);

for(let i=0;i<posAttr.count;i++){
  const x = posAttr.getX(i);
  const z = posAttr.getZ(i);
  const h = baseHeight(x,z);
  posAttr.setY(i, h);

  const d = Math.sqrt(x*x+z*z);
  const slope = slopeAt(x,z);
  let col;

  if(d < FLAT_RADIUS){
    col = cPlateau.clone();
    const patch = fbm(x*0.05,z*0.05,2);
    col.offsetHSL(0,0,(patch-0.5)*0.05);
  } else if(h < -1.4){
    col = cWater.clone();
  } else if(h < 2.2){
    col = cGrassLo.clone().lerp(cGrassHi, fbm(x*0.03,z*0.03,3));
  } else if(h < 9){
    const t = smoothstep(2.2,9,h);
    col = cGrassHi.clone().lerp(cHill, t);
  } else if(h < 17){
    const t = smoothstep(9,17,h);
    col = cHill.clone().lerp(cRock, t);
  } else {
    const t = smoothstep(17,24,h);
    col = cRock.clone().lerp(cSnow, t);
  }

  if(slope>0.9 && h>0){
    col = col.clone().lerp(cRock, Math.min(1,(slope-0.9)*1.6));
  }

  colorArr[i*3]=col.r; colorArr[i*3+1]=col.g; colorArr[i*3+2]=col.b;
}
terrainGeo.setAttribute('color', new THREE.BufferAttribute(colorArr,3));
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.95, metalness:0.02 });
const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
terrainMesh.receiveShadow = true;
terrainMesh.castShadow = true;
scene.add(terrainMesh);

// anillo de piedra marcando la futura plataforma del tablero
const ringMat = new THREE.MeshStandardMaterial({ color:0xcbb27a, roughness:0.7 });
const ring = new THREE.Mesh(new THREE.RingGeometry(FLAT_RADIUS-1.2, FLAT_RADIUS, 64), ringMat);
ring.rotation.x = -Math.PI/2;
ring.position.y = 0.05;
ring.receiveShadow = true;
scene.add(ring);

// agua (un solo plano grande; solo "aparece" donde el terreno se hunde: río y orillas)
const waterMat = new THREE.MeshStandardMaterial({
  color:0x3f8fc2, roughness:0.15, metalness:0.1, transparent:true, opacity:0.85
});
const water = new THREE.Mesh(new THREE.PlaneGeometry(TS*1.05, TS*1.05, 1,1), waterMat);
water.rotation.x = -Math.PI/2;
water.position.y = -1.55;
scene.add(water);

// terreno lejano difuminado por niebla para que no se vea el borde del mapa
const farGround = new THREE.Mesh(
  new THREE.CircleGeometry(1300,48),
  new THREE.MeshStandardMaterial({ color:0x86b9d6, roughness:1 })
);
farGround.rotation.x = -Math.PI/2;
farGround.position.y = -3;
scene.add(farGround);

/* ============================================================
   VEGETACIÓN Y ROCAS (instanciado para rendimiento)
   ============================================================ */

function paintGeometry(geo, hex){
  const color = new THREE.Color(hex);
  const count = geo.attributes.position.count;
  const arr = new Float32Array(count*3);
  for(let i=0;i<count;i++){ arr[i*3]=color.r; arr[i*3+1]=color.g; arr[i*3+2]=color.b; }
  geo.setAttribute('color', new THREE.BufferAttribute(arr,3));
  return geo;
}

function buildTreeGeometry(){
  const trunk = new THREE.CylinderGeometry(0.14,0.22,1.5,7);
  trunk.translate(0,0.75,0);
  paintGeometry(trunk, 0x6b4a2f);

  const parts = [trunk];
  for(let i=0;i<3;i++){
    const s = 1.05 - i*0.22;
    const cone = new THREE.ConeGeometry(1.0*s,1.4*s,8);
    cone.translate(0, 1.35 + i*0.8, 0);
    paintGeometry(cone, i%2===0 ? 0x3f7d3a : 0x4c8f44);
    parts.push(cone);
  }
  return BufferGeometryUtils.mergeGeometries(parts, false);
}

function buildPineGeometry(){
  const trunk = new THREE.CylinderGeometry(0.12,0.18,1.2,7);
  trunk.translate(0,0.6,0);
  paintGeometry(trunk, 0x5b4530);

  const parts = [trunk];
  for(let i=0;i<4;i++){
    const s = 0.85 - i*0.16;
    const cone = new THREE.ConeGeometry(0.75*s,1.0*s,8);
    cone.translate(0, 1.05 + i*0.62, 0);
    paintGeometry(cone, 0x2f5c3a);
    parts.push(cone);
  }
  return BufferGeometryUtils.mergeGeometries(parts, false);
}

function buildBushGeometry(){
  const offsets = [[0,0.28,0,0.42],[0.24,0.22,0.1,0.3],[-0.22,0.24,-0.12,0.32],[0.05,0.35,-0.2,0.28]];
  const parts = offsets.map(([x,y,z,r])=>{
    const g = new THREE.SphereGeometry(r,8,7);
    g.translate(x,y,z);
    paintGeometry(g, 0x4a8a3f);
    return g;
  });
  return BufferGeometryUtils.mergeGeometries(parts, false);
}

function buildRockGeometry(){
  const a = new THREE.IcosahedronGeometry(0.9,0);
  paintGeometry(a, 0x8d8479);
  const b = new THREE.IcosahedronGeometry(0.55,0);
  b.translate(0.4,0.15,0.2);
  paintGeometry(b, 0x94897c);
  return BufferGeometryUtils.mergeGeometries([a,b], false);
}

function makeInstanced(geo, material, transforms){
  const mesh = new THREE.InstancedMesh(geo, material, transforms.length);
  const dummy = new THREE.Object3D();
  const col = new THREE.Color();
  transforms.forEach((tr, i)=>{
    dummy.position.set(tr.x, tr.y, tr.z);
    dummy.rotation.set(0, tr.ry, 0);
    dummy.scale.setScalar(tr.scale);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    const v = 0.9 + Math.random()*0.2;
    col.setRGB(v,v,v);
    mesh.setColorAt(i, col);
  });
  mesh.instanceMatrix.needsUpdate = true;
  if(mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

const treeTransforms=[], pineTransforms=[], bushTransforms=[], rockTransforms=[];
const STEP = 6.4;
for(let x=-HALF+4; x<HALF-4; x+=STEP){
  for(let z=-HALF+4; z<HALF-4; z+=STEP){
    const jx = x + (Math.random()-0.5)*STEP*0.85;
    const jz = z + (Math.random()-0.5)*STEP*0.85;
    const d = Math.sqrt(jx*jx+jz*jz);
    if(d < FLAT_RADIUS+8) continue; // dejar libre la plataforma central

    const h = baseHeight(jx,jz);
    const slope = slopeAt(jx,jz);
    if(h < -1.0) continue; // agua

    const r = Math.random();

    if(h>=0.2 && h<8 && slope<0.55){
      if(r<0.34){
        treeTransforms.push({x:jx,y:h,z:jz, ry:Math.random()*Math.PI*2, scale:0.85+Math.random()*0.7});
      } else if(r<0.55){
        bushTransforms.push({x:jx,y:h,z:jz, ry:Math.random()*Math.PI*2, scale:0.8+Math.random()*0.6});
      } else if(r<0.60 && slope>0.3){
        rockTransforms.push({x:jx,y:h,z:jz, ry:Math.random()*Math.PI*2, scale:0.6+Math.random()*0.8});
      }
    } else if(h>=8 && h<15 && slope<0.75){
      if(r<0.28){
        pineTransforms.push({x:jx,y:h,z:jz, ry:Math.random()*Math.PI*2, scale:0.8+Math.random()*0.6});
      } else if(r<0.4){
        rockTransforms.push({x:jx,y:h,z:jz, ry:Math.random()*Math.PI*2, scale:0.7+Math.random()*1.0});
      }
    } else if(h>=15 && h<20){
      if(r<0.22){
        rockTransforms.push({x:jx,y:h,z:jz, ry:Math.random()*Math.PI*2, scale:0.9+Math.random()*1.3});
      }
    }
  }
}

const leafMat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.9 });
const rockMat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.95 });

if(treeTransforms.length) scene.add(makeInstanced(buildTreeGeometry(), leafMat, treeTransforms));
if(pineTransforms.length) scene.add(makeInstanced(buildPineGeometry(), leafMat, pineTransforms));
if(bushTransforms.length) scene.add(makeInstanced(buildBushGeometry(), leafMat, bushTransforms));
if(rockTransforms.length) scene.add(makeInstanced(buildRockGeometry(), rockMat, rockTransforms));

/* ============================================================
   CIELO: nubes simples a la deriva
   ============================================================ */

function makeCloud(x,y,z,scale){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:1, transparent:true, opacity:0.9 });
  const puffs = 4 + Math.floor(Math.random()*3);
  for(let i=0;i<puffs;i++){
    const s = new THREE.Mesh(new THREE.SphereGeometry(1.4+Math.random()*1.1, 8,8), mat);
    s.position.set((i-puffs/2)*1.6 + Math.random()*0.6, Math.random()*0.5, Math.random()*0.8);
    g.add(s);
  }
  g.scale.setScalar(scale);
  g.position.set(x,y,z);
  g.userData.speed = 0.6+Math.random()*0.8;
  return g;
}
const clouds = [];
for(let i=0;i<34;i++){
  const c = makeCloud(rand(-HALF,HALF), rand(60,110), rand(-HALF,HALF), rand(2.5,5.5));
  clouds.push(c);
  scene.add(c);
}

/* ============================================================
   BUCLE DE RENDER
   ============================================================ */

document.getElementById('loading').style.opacity = '0';
setTimeout(()=>{ document.getElementById('loading').style.display='none'; }, 550);

const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  clouds.forEach(c=>{
    c.position.x += dt*c.userData.speed;
    if(c.position.x > HALF+30) c.position.x = -HALF-30;
  });

  const t = clock.getElapsedTime();
  water.material.opacity = 0.8 + Math.sin(t*0.8)*0.03;

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
